# Dual-Arm Avoidance Planner (ALM + Newton) parameters
#   after editing the yaml, restart move_group to take effect; no recompilation needed
planning_plugin: 'dual_arm_alm_newton_planner/DualArmAlmNewtonPlannerManager'
request_adapters: >-
  default_planner_request_adapters/FixWorkspaceBounds
  default_planner_request_adapters/FixStartStateBounds
  default_planner_request_adapters/FixStartStateCollision
  default_planner_request_adapters/FixStartStatePathConstraints

# ===== Commonly tuned parameters =====
path_weight: 0.5            # A/B arm cost weight pw*fA+(1-pw)*fB, range [0,1]
                            #   larger: the avoidance amplitude of RA610-1476-GC2 (big_arm) becomes smaller, that of RA605-710-GC2 (small_arm) larger
                            #   smaller: the avoidance amplitude of RA610-1476-GC2 (big_arm) becomes larger, that of RA605-710-GC2 (small_arm) smaller
danger_threshold: 0.35       # danger-factor threshold; this value + collision_tolerance = collision boundary (0.5); their sum must not exceed 0.5 (exceeding it misses genuine collisions)
collision_tolerance: 0.15    # collision-detection buffer band (this value = collision boundary (0.5) - danger_threshold)
fix_tolerance: 0.1          # find_targets leading/trailing clearance ratio
max_refinement_iter: 15     # maximum number of outer repair rounds

# ===== Trajectory smoothing weights =====   # the larger the smoothing weight, the smoother the path
smooth_w: 0.3               # base weight on the distance from the original configuration (||Xm-Xm^ori||^2)
smooth_w_H: 1.0             # smoothing weight on the distance between the first joint configuration and the Head end (||X1-XH||^2) (recommended equal to smooth_w_T, smooth_w_neighbor)
smooth_w_T: 1.0             # smoothing weight on the distance between the third joint configuration and the Tail end (||X3-XT||^2) (recommended equal to smooth_w_H, smooth_w_neighbor)
smooth_w_neighbor: 1.0      # smoothing weight on the distance between two adjacent configurations (||X_m+1-X_m||^2) (recommended equal to smooth_w_H, smooth_w_T)

# ===== ALM parameters [NEW] (initial values annotated per line; the tuning knobs for a diverging path) =====
#   tuning guide (three scenarios):
#     divergence (values blow up)      → first lower alm_beta_c, then alm_c_max, then alm_c0
#     fails to converge in time (outer rounds exhausted)  → increase alm_k_outer
#     persistently unable to converge (stuck)    → first raise alm_beta_c, then alm_c_max
#   how to tell: divergence = warning / ‖G‖ blows up; not-in-time = rounds exhausted but maxD still decreasing; stuck = maxD stalls and c has hit c_max
alm_mu0: 10.0                  # multiplier warm-start initial value (original value 10); no upper bound
alm_c0: 5.0                    # penalty-parameter initial value (original value 5); ⚠ do not exceed alm_c_max
alm_c_max: 2000.0              # penalty-parameter upper bound (unified to 2000 across the three solvers); large = pushes down deep collisions, small = safer but may stall; ⚠ should not be too large: the larger c is, the more the penalty-term Hessian dominates → the condition number of H deteriorates → the Newton direction from the LDLT solve becomes inaccurate
alm_gamma_v: 0.5               # amplification trigger ratio ||V_k|| > gamma_v*||V_k-1|| (original value 0.5, must lie in 0~1); small = c grows fast, near 1 = grows slow
alm_beta_c: 2.0                # penalty amplification factor c <- beta_c*c (unified to 2 across the three solvers; must be > 1); large = fast but prone to divergence, near 1 = stable but slow; ⚠ should not be too large: amplifying c too quickly raises the condition number prematurely, so a gentle schedule is recommended for Newton
alm_k_outer: 50                # maximum number of outer ALM rounds; too few fails to converge in time
alm_k_inner: 200               # maximum inner iterations; if too few, the coarse subproblem solution drags down the outer loop

# ===== Joint-name prefixes (adjust per SRDF) =====
joint_prefix_A: "big_joint_"      # Arm A (RA610): big_joint_1 ~ big_joint_6
joint_prefix_B: "small_joint_"    # Arm B (RA605): small_joint_1 ~ small_joint_6

# ===== Time parameterization (handled inside the plugin) =====
time_optimal: true          # true=TOTG time-optimal; false=custom equal-interval
path_total_time: 20.0        # (when time_optimal=false) target total trajectory time (seconds)
min_time_interval: 0.05     # (when time_optimal=false) minimum time interval per point (seconds)

# ===== Diagnostic output (all disabled by default) =====
export_csv_prefix: "./alm_data"   # export root directory: <prefix>/<unix-seconds>_Newton/ (nothing exported when export_level=0)
export_level: 0             # 0=nothing exported at all (master switch)
                            # 1=standard 6 files (meta/summary/inner/danger_final/danger_rounds/targets)
                            # 2=full 9 files (+constraints_all/path_original/path_evolution)
