moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  # controller name = arm namespace + controller name (joint_trajectory_controller)
  # MoveIt composes the action path: /<the name below>/<action_ns>
  controller_names:
    - small_arm/joint_trajectory_controller
    - big_arm/joint_trajectory_controller

  # Arm B (small / RA605)
  # -> action: /small_arm/joint_trajectory_controller/follow_joint_trajectory
  small_arm/joint_trajectory_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: true
    joints:
      - small_joint_1
      - small_joint_2
      - small_joint_3
      - small_joint_4
      - small_joint_5
      - small_joint_6

  # Arm A (big / RA610)
  # -> action: /big_arm/joint_trajectory_controller/follow_joint_trajectory
  big_arm/joint_trajectory_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: true
    joints:
      - big_joint_1
      - big_joint_2
      - big_joint_3
      - big_joint_4
      - big_joint_5
      - big_joint_6